<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pniktrix - Premium Wall Art Prints">
    <meta name="theme-color" content="#d4af37">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23d4af37' width='100' height='100'/><text x='50' y='60' font-size='60' font-weight='bold' fill='%231a1a1a' text-anchor='middle'>P</text></svg>">
    <title>Pniktrix - Premium Wall Art</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Home Page -->
    <div id="homePage" class="page active">
        <div class="hero">
            <h1 class="brand-title">Pniktrix</h1>
            <p class="hero-subtitle">Curated Wall Art for Discerning Spaces</p>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Search prints...">
            <button id="filterToggle" class="filter-toggle" title="Filters">⚙️</button>
            <button id="favoritesToggle" class="favorites-toggle" title="Favorites">❤️<span id="favoriteCount" class="favorite-count"></span></button>
        </div>

        <div id="filterPanel" class="filter-panel hidden">
            <div class="filter-header">
                <h3>Filters</h3>
                <button id="clearFilters" class="clear-btn">Clear All</button>
            </div>
            <div class="filter-group">
                <label>Size</label>
                <div id="sizeFilters" class="filter-options"></div>
            </div>
            <div class="filter-group">
                <label>Material</label>
                <div id="materialFilters" class="filter-options"></div>
            </div>
            <div class="filter-group">
                <label>Finish</label>
                <div id="finishFilters" class="filter-options"></div>
            </div>
        </div>

        <div class="gallery-container">
            <div id="galleryGrid" class="gallery-grid"></div>
            <div id="emptyState" class="empty-state hidden">
                <p>No prints found. Try adjusting your filters.</p>
            </div>
        </div>
    </div>

    <!-- Product Detail Modal -->
    <div id="productModal" class="product-modal">
        <div class="modal-handle"></div>
        <div class="modal-content">
            <div class="product-detail"></div>
        </div>
    </div>

    <!-- Contact Modal -->
    <div id="contactModal" class="modal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-box">
            <button class="modal-close" id="closeModal">&times;</button>
            <h2>Get in Touch</h2>
            <iframe data-tally-src="https://tally.so/embed/w4d6d9" width="100%" height="400" frameborder="0" marginheight="0" marginwidth="0" style="margin: 0; border-radius: 12px;"></iframe>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/gesture-detector.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/product.js"></script>
    <script src="js/product-detail.js"></script>
    <script src="js/search-filter.js"></script>
    <script src="js/recommendations.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/message.js"></script>
    <script src="js/validator.js"></script>
    <script src="js/whatsapp.js"></script>
    <script src="js/instagram.js"></script>
    <script src="js/tally.js"></script>
    <script src="js/slider.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/pixel.js"></script>
    <script src="js/metrics.js"></script>
    <script src="js/image-optimizer.js"></script>
    <script src="js/ab-testing.js"></script>
    <script src="js/seo.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/email.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/monetization.js"></script>
    <script src="js/reviews.js"></script>
    <script src="js/api-integration.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/debug.js"></script>
    <script src="js/app.js"></script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
