<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Pniktrix — Wall Art Prints</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- ── SPLASH ─────────────────────────────────── -->
  <div id="splash">
    <div class="sp-brand">Pniktrix</div>
    <div class="sp-sub">Curated Wall Art Prints</div>
    <div class="sp-bar"></div>
  </div>

  <!-- ── HEADER ─────────────────────────────────── -->
  <header class="hdr">
    <div class="hdr-logo">Pniktrix</div>
    <button class="hdr-pill" id="hdr-pill" onclick="App.openBar()">
      Order Now
      <span class="hdr-badge" id="hdr-n">0</span>
    </button>
  </header>

  <!-- ── HERO SLIDER ────────────────────────────── -->
  <div class="hero">
    <div class="hero-track" id="hero-track"></div>
    <div class="hero-nav"   id="hero-nav"></div>
  </div>

  <!-- ── SELECTED PREVIEW STRIP ────────────────── -->
  <div id="strip"></div>

  <!-- ── CATEGORY FILTER BAR ──────────────────── -->
  <!-- Horizontal scroll pill tabs — one per category in products.json -->
  <div class="cat-bar" id="cat-bar">
    <!-- Pills are injected by category.js at runtime -->
  </div>

  <!-- ── GALLERY ────────────────────────────────── -->
  <div class="sec"><span id="sec-label">All Prints</span></div>
  <div class="grid" id="grid">
    <div class="loading" style="grid-column:1/-1">
      <div class="spin"></div>
    </div>
  </div>

  <div class="hint" id="hint">Tap any print to select it, then place your order</div>

  <!-- ── TRUST STRIP ────────────────────────────── -->
  <div class="trust">
    <div class="ti">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      No advance payment
    </div>
    <div class="ti">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Ships in 3-4 days
    </div>
    <div class="ti">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Premium quality print
    </div>
  </div>

  <div class="spacer"></div>

  <!-- ── STICKY CONTACT BAR ─────────────────────── -->
  <div id="bar">
    <div class="bar-row">
      <button class="btn btn-wa" onclick="App.goWhatsApp()">
        <svg class="bico" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
        </svg>
        WhatsApp
      </button>
      <button class="btn btn-ig" onclick="App.goInstagram()">
        <svg class="bico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
        Instagram DM
      </button>
    </div>
    <button class="btn btn-ghost" style="max-width:480px;margin:0.3rem auto 0;display:flex;"
      onclick="App.openTally()">
      Prefer to leave your details instead?
    </button>
  </div>

  <!-- ── ZOOM VIEWER POPUP ─────────────────────── -->
  <!-- Opens when user taps the zoom icon on any product card -->
  <!-- Clicking blank overlay area also closes it -->
  <div id="zoom-overlay" onclick="if(event.target===this)App.closeZoom()">
    <div class="zv-sheet">

      <!-- Image slider strip — built and injected by viewer.js -->
      <!-- zv-strip slides horizontally inside this clipping wrapper -->
      <div class="zv-img-wrap" id="zv-img-wrap">
        <!-- strip injected here by viewer.js -->
      </div>

      <!-- Dot navigation for multiple images -->
      <div class="zv-dots" id="zv-dots"></div>

      <!-- Product name — simple, no price -->
      <div class="zv-name" id="zv-name"></div>

      <!-- X close button just above Add to Order -->
      <button class="zv-close-btn" onclick="App.closeZoom()">&#x2715; Close</button>

      <!-- Add to Order — toggles selection and closes viewer -->
      <button class="zv-add-btn" id="zv-add-btn" onclick="App.zoomAddToCart()">
        Add to Order
      </button>

    </div>
  </div>

  <!-- ── GOOGLE FORM POPUP ─────────────────────── -->
  <div id="gform-overlay" onclick="if(event.target===this)App.closeTally()">
    <div class="gf-sheet">
      <div class="gf-top">
        <div class="gf-top-left">
          <div class="gf-dot"></div>
          <span class="gf-label">Leave Your Details</span>
        </div>
        <button class="gf-close" onclick="App.closeTally()">&#x2715;</button>
      </div>
      <div class="gf-body">
        <iframe
          id="gform-frame"
          src="https://docs.google.com/forms/d/e/1FAIpQLSewJChwBQLRRjMgUvPCPoRSbnJNIKh3TWGbIpnwqhqs3qrfgA/viewform?embedded=true"
          frameborder="0"
          marginheight="0"
          marginwidth="0"
          title="Leave your details"
        >Loading...</iframe>
      </div>
    </div>
  </div>

  <!-- ── TOAST ──────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ════════════════════════════════════════════
       JS MODULES — loaded in dependency order
  ═════════════════════════════════════════════ -->
  <script src="js/config.js"></script>
  <script src="js/pixel.js"></script>
  <script src="js/product.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/message.js"></script>
  <script src="js/validator.js"></script>
  <script src="js/whatsapp.js"></script>
  <script src="js/instagram.js"></script>
  <script src="js/tally.js"></script>
  <script src="js/slider.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/category.js"></script>
  <script src="js/viewer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
